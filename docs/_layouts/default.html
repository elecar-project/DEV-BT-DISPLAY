<!doctype html>
<html lang="zh-Hant">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{% if page.title %}{{ page.title }} | {% endif %}{{ site.title }}</title>
    <meta name="description" content="{{ page.description | default: site.description }}">
    <meta name="site-baseurl" content="{{ site.baseurl }}">
    <link rel="stylesheet" href="{{ '/assets/css/style.css' | relative_url }}">
  </head>
  <body>
    <header class="site-header">
      <a class="brand" href="{{ '/' | relative_url }}" aria-label="{{ site.title }}首頁">
        <span class="brand-mark">DB</span>
        <span>
          <strong>DEV-BT</strong>
          <small>研究展示站</small>
        </span>
      </a>
      <nav class="site-nav" aria-label="主要導覽">
        <a href="{{ '/' | relative_url }}">總覽</a>
        <a href="{{ '/method.html' | relative_url }}">方法</a>
        <a href="{{ '/datasets.html' | relative_url }}">資料集</a>
        <a href="{{ '/tools.html' | relative_url }}">工具</a>
        <a href="{{ '/results.html' | relative_url }}">結果</a>
        <a href="{{ '/appendix.html' | relative_url }}">附錄</a>
      </nav>
    </header>

    <main class="page-shell">
      {{ content }}
    </main>

    <footer class="site-footer">
      <span>DEV-BT 內部研究展示站。</span>
      <a href="https://github.com/elecar-project/DEV-BT/releases">Release 檔案</a>
      <a href="https://github.com/elecar-project/DEV-BT">母倉庫</a>
    </footer>
  </body>
</html>
